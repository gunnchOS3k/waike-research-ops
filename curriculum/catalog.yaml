version: 1
program: WAIKE
ethos_statement: >
  WAIKE uses the 7GC campuses as case-study environments because technology education
  should not be abstract. Learners study real communities, real constraints, real risks,
  and real opportunities. The goal is not to drop technology into a place. The goal is to
  build with context, local respect, technical skill, and community benefit.

